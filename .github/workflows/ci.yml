name: OrangeHRM Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Create config.properties
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/config.properties << EOF
          base.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login
          admin.username=${{ secrets.ORANGEHRM_USERNAME }}
          admin.password=${{ secrets.ORANGEHRM_PASSWORD }}
          browser=chrome
          headless=true
          explicit.wait=20
          long.wait=30
          EOF

      - name: List config file
        run: cat src/test/resources/config.properties

      - name: Run smoke tests
        run: mvn test -P smoke -Dbrowser=chrome -Dheadless=true

      - name: List generated report files
        if: always()
        run: find target/ -name "*.html" 2>/dev/null || echo "No HTML files"

      - name: Upload smoke test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-reports
          path: target/
          retention-days: 7

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Create config.properties
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/config.properties << EOF
          base.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login
          admin.username=${{ secrets.ORANGEHRM_USERNAME }}
          admin.password=${{ secrets.ORANGEHRM_PASSWORD }}
          browser=chrome
          headless=true
          explicit.wait=20
          long.wait=30
          EOF

      - name: Run regression tests
        run: mvn test -P regression -Dbrowser=chrome -Dheadless=true

      - name: Upload regression reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-reports
          path: target/
          retention-days: 7